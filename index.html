<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenStudio — Supply Management for Small Businesses</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#FF5C00;--orange-light:#FF7A2B;
  --black:#080808;--surface:#111;--surface2:#1a1a1a;
  --text:#F0EDE8;--muted:#7A7570;--border:rgba(255,255,255,0.07);
}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 60px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(8,8,8,0.9);backdrop-filter:blur(12px)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--orange)}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-link{color:var(--muted);font-size:14px;font-weight:500;text-decoration:none;transition:color .2s}
.nav-link:hover{color:var(--text)}
.nav-cta{background:var(--orange);color:#fff;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;transition:background .2s}
.nav-cta:hover{background:var(--orange-light)}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 40px 80px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(255,92,0,.08),transparent)}
.hero-eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--orange);margin-bottom:24px;font-weight:600}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(64px,10vw,120px);line-height:.95;letter-spacing:2px;margin-bottom:28px}
.hero-title span{color:var(--orange)}
.hero-sub{font-size:18px;color:var(--muted);max-width:520px;margin:0 auto 48px;line-height:1.7;font-weight:400}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn-hero{padding:16px 36px;border-radius:10px;font-size:16px;font-weight:600;text-decoration:none;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--orange);color:#fff}.btn-primary:hover{background:var(--orange-light);transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:#222}
.hero-note{margin-top:20px;font-size:13px;color:var(--muted)}.hero-note span{color:var(--orange)}

/* PREVIEW */
.preview{padding:0 40px 100px;max-width:1100px;margin:0 auto}
.preview-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.6)}
.preview-bar{background:var(--surface2);padding:14px 20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.dot{width:12px;height:12px;border-radius:50%}
.dot-r{background:#FF5F57}.dot-y{background:#FEBC2E}.dot-g{background:#28C840}
.preview-url{background:var(--black);border-radius:6px;padding:4px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-left:8px}
.preview-img{width:100%;height:420px;background:linear-gradient(160deg,#141414 0%,#111 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.mock-sidebar{position:absolute;left:0;top:0;bottom:0;width:200px;background:#141414;border-right:1px solid var(--border);padding:20px 0}
.mock-logo{padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:12px}
.mock-logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--orange);letter-spacing:2px}
.mock-nav-item{padding:9px 20px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
.mock-nav-item.active{color:var(--orange);background:rgba(255,92,0,.08);border-left:2px solid var(--orange)}
.mock-content{position:absolute;left:200px;right:0;top:0;bottom:0;padding:24px}
.mock-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:20px}
.mock-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.mock-card{background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:16px}
